# /pause-ignore — bypass pause-claude-code threshold checks for a session
#
# Usage:
#   /pause-ignore          — ignore for 5 hours (default)
#   /pause-ignore 2h       — ignore for 2 hours
#   /pause-ignore 30m      — ignore for 30 minutes
#   /pause-ignore 3        — ignore for 3 hours (integer = hours)

description = "Bypass context-window pause checks for a configurable duration (default: 5 hours). Use when approaching limits intentionally."

prompt = """
The user wants to bypass pause-claude-code context window checks.

Parse the argument (if any) from the user's message:
- No argument → 5 hours
- Ends with 'h' (e.g. "2h") → that many hours
- Ends with 'm' (e.g. "30m") → that many minutes
- Plain integer (e.g. "3") → that many hours

Compute the unix timestamp for (now + duration) and write it to ~/.claude/safeclaude/ignore-until as a plain integer, creating the directory if needed. Then confirm to the user how long checks will be suppressed.

Run this as a shell command via the Bash tool:
```
mkdir -p ~/.claude/safeclaude
# duration parsing happens in the shell command below
```

After writing the file, tell the user: "Context window pause checks suppressed until [human-readable time]. Run /pause-ignore again or delete ~/.claude/safeclaude/ignore-until to re-enable."
"""
