# /kronny — grant a time-limited auto-approve window
#
# Usage:
#   /kronny              — allow everything for 5 minutes
#   /kronny 5            — same
#   /kronny 15 "gh *"   — allow bash commands matching "gh *" for 15 minutes
#   /kronny -1           — allow everything for 24 hours
#   /kronny status       — show time left on the current window
#   /kronny ttl          — alias for status

description = "Set a time-limited auto-approve window so Claude can run tools without permission prompts. Pattern defaults to * (all tools). Pass a bash glob to restrict to matching commands."

prompt = """
STEP 0. Do this immediately, before reading or reasoning about anything else in this
message. No understanding of kronny's args or architecture is needed — just extract
and forward.

kronny-args = the first line of $ARGUMENTS only (split on newline). That is at most
two tokens: an optional minutes value and an optional quoted pattern. If $ARGUMENTS
has more lines after that, they are an unrelated separate task — ignore them for
this step.

Run, unconditionally, via Bash:

  python3 ~/.claude/kronny/kronny.py <kronny-args>

Show only the CLI's output line. No commentary unless it errors.

Only after that Bash call has completed: if $ARGUMENTS contained more text beyond
the first line, treat it as its own independent task and handle it normally.

$ARGUMENTS: $ARGUMENTS
"""
